# ══════════════════════════════════════════════════════════════
# docker-compose.yml — Directorio Interactivo CASATIC 2026
# Stack: PostgreSQL + API .NET 8 + Frontend React + pgAdmin
#
# Todos los secretos se leen del archivo .env (no se sube a Git).
# Copiar .env.example → .env y rellenar valores antes de levantar.
# ══════════════════════════════════════════════════════════════
services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: casatic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["postgres", "-c", "client_encoding=UTF8"]
    # En producción comentá este `ports` para que la BD sólo sea
    # accesible desde la red interna de Docker.
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/docker script/01-init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro
      - ./backend/docker script/current-data.sql:/docker-entrypoint-initdb.d/02-current-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [casatic-net]

  # ── pgAdmin ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: casatic-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks: [casatic-net]

  # ── Backend API (.NET 8) ───────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casatic-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpireMinutes: ${JWT_EXPIRE_MINUTES:-60}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-admin@casatic.org}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/wwwroot/logos
      - event_uploads:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy
    networks: [casatic-net]

  # ── Frontend React (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: casatic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks: [casatic-net]

volumes:
  pgdata:
  uploads:
  event_uploads:

networks:
  casatic-net:
    driver: bridge
